---

- name: Install packages that allow apt to be used over HTTPS
  apt:
      name: "{{ packages }}"
      state: present
      update_cache: yes
  vars:
      packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg-agent
      - software-properties-common
      - gpg

- name: Add an apt signing key for Docker
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: yes

- name: Add apt repository for stable version
  apt_repository:
      repo: deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu noble stable
      state: present

- name: Install docker and its dependecies
  apt: 
      name: "{{ packages }}"
      state: present
      update_cache: yes
  vars:
      packages:
      - docker-ce 
      - docker-ce-cli 
      - containerd.io
  notify:
      - docker status

- name: Remove swapfile from /etc/fstab
  mount:
      name: "{{ item }}"
      fstype: swap
      state: absent
  with_items:
      - swap
      - none

- name: Disable swap
  command: swapoff -a
  when: ansible_swaptotal_mb > 0

- name: Create keyrings directory
  file:
     path: /etc/apt/keyrings
     state: directory
     mode: '0755'

- name: Download Kubernetes GPG key
  get_url:
      url: "https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/Release.key"
      dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
      mode: '0644'

- name: Add Kubernetes Repository
  apt_repository:
      repo: "deb [arch=arm64 signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/{{ k8s_version }}/deb/ /"
      state: present
      filename: kubernetes

- name: Install Kubernetes binaries
  apt: 
      name: "{{ packages }}"
      state: present
      update_cache: yes
  vars:
      packages:
        - kubelet 
        - kubeadm 
        - kubectl
        - kubernetes-cni

- name: Configure node ip
  lineinfile:
      path: /etc/default/kubelet
      line: KUBELET_EXTRA_ARGS=--node-ip={{ ansible_default_ipv4.address }}

- name: Restart kubelet
  service:
      name: kubelet
      daemon_reload: yes
      state: restarted
